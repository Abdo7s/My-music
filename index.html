<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسيقاي | My Music</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <button class="menu-btn" id="open-menu"><i class="fas fa-bars"></i></button>

    <nav class="sidebar" id="sidebar">
        <div class="logo"><i class="fab fa-apple"></i> Music</div>
        <div class="menu-items">
            <div class="item active" onclick="showSection('home')"><i class="fas fa-home"></i> الرئيسية</div>
            <div class="item" id="admin-add-btn" style="display:none;" onclick="openModal()"><i class="fas fa-plus-circle"></i> إضافة موسيقى</div>
        </div>
        <div class="user-box">
            <p id="user-name"></p>
            <button id="auth-btn" class="btn-main">تسجيل الدخول</button>
        </div>
    </nav>

    <main class="content">
        <section id="home">
            <h2 class="section-title">المكتبة الموسيقية</h2>
            <div class="music-grid" id="music-container">
                </div>
        </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h3>نشر عمل جديد</h3>
            <input type="text" id="s-title" placeholder="اسم الأغنية">
            <input type="text" id="s-img" placeholder="رابط الصورة (URL)">
            <input type="text" id="s-url" placeholder="رابط ملف التحميل (URL)">
            <button onclick="uploadMusic()" class="btn-main">نشر الآن</button>
            <button onclick="closeModal()" class="btn-cancel">إلغاء</button>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
