<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسيقاي | My Music</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <button class="menu-toggle" id="menu-toggle"><i class="fas fa-bars"></i></button>

    <nav class="sidebar" id="sidebar">
        <div class="logo">
            <i class="fab fa-apple"></i> <span>Music</span>
        </div>
        <div class="menu">
            <div class="item active" onclick="showSection('home')"><i class="fas fa-home"></i> الرئيسية</div>
            <div class="item" onclick="showSection('new')"><i class="fas fa-th-large"></i> جديد</div>
            <div class="item"><i class="fas fa-search"></i> بحث</div>
        </div>
        
        <div class="auth-box">
            <p id="user-info"></p>
            <button id="login-btn" class="btn-primary">تسجيل الدخول</button>
        </div>
    </nav>

    <main class="main-content">
        <div id="home-section" class="section">
            <h1>الرئيسية</h1>
            <div class="music-grid">
                <div class="card">
                    <div class="cover">
                        <img src="images/cover1.jpg" alt="Song Cover">
                        <button class="play-overlay"><i class="fas fa-play"></i></button>
                    </div>
                    <h3>أغنية حماسية</h3>
                    <button class="dl-button" onclick="checkAuthAndDownload('رابط_الأغنية')">تحميل</button>
                </div>
            </div>
        </div>

        <div id="new-section" class="section" style="display:none;">
            <h1>الإضافات الجديدة</h1>
            </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
