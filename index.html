<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snaptube Pro Web - المتصفح والمحمل الذكي</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <header class="main-header">
        <div class="logo">SNAPTUBE<span>PRO</span></div>
        <div class="search-engine">
            <input type="text" id="browser-input" placeholder="ابحث في جوجل أو ادخل رابط موقع...">
            <button onclick="goBrowse()"><i class="fas fa-search"></i></button>
        </div>
    </header>

    <main class="container">
        <section class="shortcuts">
            <a href="https://www.youtube.com" target="_blank" class="icon-card"><i class="fab fa-youtube" style="color:#ff0000;"></i><span>يوتيوب</span></a>
            <a href="https://www.facebook.com" target="_blank" class="icon-card"><i class="fab fa-facebook" style="color:#1877f2;"></i><span>فيسبوك</span></a>
            <a href="https://www.tiktok.com" target="_blank" class="icon-card"><i class="fab fa-tiktok" style="color:#fff;"></i><span>تيك توك</span></a>
            <a href="https://www.instagram.com" target="_blank" class="icon-card"><i class="fab fa-instagram" style="color:#e4405f;"></i><span>انستقرام</span></a>
        </section>

        <section class="download-box">
            <h3><i class="fas fa-bolt"></i> محرك التحميل المتعدد الصيغ</h3>
            <input type="text" id="video-url" placeholder="ضع رابط الفيديو هنا...">
            
            <div class="controls-grid">
                <select id="format-type" onchange="toggleQualityOptions()">
                    <option value="mp4">فيديو (MP4)</option>
                    <option value="mp3">موسيقى (MP3)</option>
                </select>

                <select id="quality-selector">
                    <option value="max">أعلى جودة متاحة (4K/HD)</option>
                    <option value="1080">1080p</option>
                    <option value="720">720p</option>
                    <option value="480">480p</option>
                    <option value="360">360p</option>
                    <option value="144">144p</option>
                </select>
            </div>
            
            <button onclick="handleDownload()" id="action-btn" class="btn-main-action">استخراج ومعاينة</button>

            <div id="loader" class="loader" style="display:none;">
                <div class="spinner"></div>
                <p>جاري فحص الروابط والجودات...</p>
            </div>

            <div id="result-area" class="result-container" style="display:none;">
                </div>
        </section>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
