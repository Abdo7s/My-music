<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موسيقاي | My Music</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="sidebar">
        <div class="logo">
            <i class="fab fa-apple"></i> <span>Music</span>
        </div>
        <div class="menu">
            <div class="item active"><i class="fas fa-home"></i> الرئيسية</div>
            <div class="item"><i class="fas fa-th-large"></i> جديد</div>
            <div class="item"><i class="fas fa-broadcast-tower"></i> الراديو</div>
            <div class="item"><i class="fas fa-search"></i> بحث</div>
        </div>
        
        <div class="auth-box">
            <p id="user-info"></p>
            <button id="login-btn" class="btn-primary">تسجيل الدخول</button>
        </div>
    </nav>

    <main class="main-content">
        <header>
            <h1>استكشف الجديد</h1>
        </header>

        <div class="music-grid">
            <div class="card">
                <div class="cover">
                    <img src="https://via.placeholder.com/300/282828/ffffff?text=Song+1" alt="Cover">
                    <button class="play-overlay"><i class="fas fa-play"></i></button>
                </div>
                <h3>عنوان الأغنية</h3>
                <p>اسم الفنان</p>
                <button class="dl-button" onclick="checkAuthAndDownload('https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3')">
                    <i class="fas fa-download"></i> تحميل
                </button>
            </div>

            <div class="card">
                <div class="cover">
                    <img src="https://via.placeholder.com/300/282828/ffffff?text=Video+1" alt="Cover">
                    <button class="play-overlay"><i class="fas fa-video"></i></button>
                </div>
                <h3>فيديو كليب جديد</h3>
                <p>شاهد الآن</p>
                <button class="dl-button" onclick="checkAuthAndDownload('رابط_الفيديو_هنا')">
                    <i class="fas fa-download"></i> تحميل الفيديو
                </button>
            </div>
        </div>
    </main>

    <script type="module" src="script.js"></script>
</body>
</html>
