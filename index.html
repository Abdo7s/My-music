<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SamTupe Pro</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="login-screen">
        <div class="login-card">
            <h1 style="color: #ffc107;">SamTupe</h1>
            <p>مرحباً بك في متصفحك الخاص</p>
            <button onclick="loginGoogle()" class="btn-g">
                <i class="fab fa-google"></i> دخول بواسطة جوجل
            </button>
        </div>
    </div>

    <header>
        <img id="user-img" src="" class="avatar" alt="User">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="ابحث أو ضع رابط فيديو...">
            <i class="fas fa-search" onclick="startSearch()" style="cursor: pointer;"></i>
        </div>
    </header>

    <main>
        <iframe id="main-frame" style="display:none; width:100%; height:100%; border:none;"></iframe>
        <div id="home-placeholder">
            <i class="fas fa-rocket" style="font-size: 50px; color: #333;"></i>
            <h3>المحرك جاهز، ابدأ التصفح الآن</h3>
        </div>
    </main>

    <nav>
        <div onclick="location.reload()"><i class="fas fa-home"></i></div>
        <div><i class="fas fa-shield-alt"></i></div>
        <div><i class="fas fa-cog"></i></div>
    </nav>

    <script type="module" src="main.js"></script>
</body>
</html>
